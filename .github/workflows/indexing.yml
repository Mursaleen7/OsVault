name: Daily Google Indexing

on:
  schedule:
    # Runs daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub Actions UI

jobs:
  index-cves:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: osvault-web/package-lock.json

      - name: Install dependencies
        working-directory: osvault-web
        run: npm ci

      - name: Run smart daily indexing
        working-directory: osvault-web
        run: npx tsx smart-daily-indexing.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
          INDEXING_API_URL: ${{ secrets.INDEXING_API_URL }}
          GOOGLE_SERVICE_ACCOUNT_1: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_1 }}
          GOOGLE_SERVICE_ACCOUNT_2: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_2 }}
          GOOGLE_SERVICE_ACCOUNT_3: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_3 }}
          GOOGLE_SERVICE_ACCOUNT_4: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_4 }}
          GOOGLE_SERVICE_ACCOUNT_5: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_5 }}
          GOOGLE_SERVICE_ACCOUNT_6: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_6 }}
          GOOGLE_SERVICE_ACCOUNT_7: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_7 }}
          GOOGLE_SERVICE_ACCOUNT_8: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_8 }}
          GOOGLE_SERVICE_ACCOUNT_9: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_9 }}
          GOOGLE_SERVICE_ACCOUNT_10: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_10 }}

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexing-logs-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
