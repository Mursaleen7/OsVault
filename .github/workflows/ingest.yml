name: Daily CVE Ingestion

on:
  schedule:
    - cron: "0 5 * * *"   # 5:00 AM UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ingest:
    name: Pull & Upsert CVE Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ingest-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ingest-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build ingestion binary
        run: cargo build --release --manifest-path ingest-rs/Cargo.toml

      - name: Run ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NVD_API_KEY:  ${{ secrets.NVD_API_KEY }}
        run: ./ingest-rs/target/release/ingest

      - name: Notify on failure
        if: failure()
        run: echo "Ingestion failed at $(date -u). Check the logs above." && exit 1
