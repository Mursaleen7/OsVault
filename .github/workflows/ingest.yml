name: Daily CVE Ingestion

on:
  schedule:
    - cron: "0 5 * * *"   # 5:00 AM UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ingest:
    name: Pull & Upsert CVE Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ingest-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ingest-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build ingestion binary
        run: cargo build --release --manifest-path ingest-rs/Cargo.toml

      - name: Run ingestion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          NVD_API_KEY:  ${{ secrets.NVD_API_KEY }}
        run: ./ingest-rs/target/release/ingest

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          from: ${{ secrets.NOTIFY_EMAIL }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "❌ OsVault ingest FAILED"
          body: "The daily CVE ingestion failed. Check the logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_PASSWORD }}
          from: ${{ secrets.NOTIFY_EMAIL }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          subject: "✅ OsVault ingest succeeded"
          body: "Daily CVE ingestion completed successfully. View run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
